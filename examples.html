<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Example</title>
  <style>
    .pic {
      width: 200px;
      border-radius: 14px;
    }
    .pics {
      width: 300px;
      height: 400px;
      object-fit: cover;
    }
  .picc {
    width: 300px;
    border-radius: 4000px;
  }
  .text,
  .text-1 {
    display: block;
  }
  .text-1 {
    margin-top: 4px;
  }
  .text-2 {
    width: 300px;
  }
  .text-3,
  .text-4,
  .text-2 {
    display: inline-block;
    vertical-align: middle;
  }
  </style>
</head>
<body>
  <img class="pic" src="images/sp.png" alt="">
  <img class="pics" src="images/219169696147020231010181110_20231003_234334.jpg" alt="">
  <img class="picc" src="images/sp.png" alt="">
  <input class="text" type="text" placeholder="Name">
  <input class="text-1" type="text" placeholder="Email">
  <p class="text-2">Thanks for chatting with our customer support. Would you like a quick survey? </p>
  <button class="text-3">Yes</button>
  <button class="text-4">No</button>
</body>
</html>
